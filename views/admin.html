<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Pelotonia New Rider Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #44D62C;
      --green-dark: #35b020;
      --green-dim:  rgba(68,214,44,.12);
      --black:      #000000;
      --dark:       #1e1e1e;
      --body-text:  #3b3b3b;
      --muted:      #757575;
      --border:     #e0e0e0;
      --surface:    #f4f4f4;
      --white:      #ffffff;
      --danger:     #d32f2f;
      --danger-light: #ffebee;
      --shadow:     0 1px 3px rgba(0,0,0,.10);
      --shadow-md:  0 4px 12px rgba(0,0,0,.10);
      --shadow-lg:  0 12px 32px rgba(0,0,0,.18);
      --radius:     4px;
    }

    body {
      font-family: 'Barlow', Arial, sans-serif;
      background: var(--surface);
      color: var(--body-text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--dark);
      color: var(--white);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .75rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: .5rem;
      text-decoration: none;
    }
    .logo-arrow { color: var(--green); font-family: 'Barlow Condensed', Arial, sans-serif; font-weight: 800; font-size: 1.3rem; }
    .logo-text  { color: var(--white);  font-family: 'Barlow Condensed', Arial, sans-serif; font-weight: 800; font-size: 1.25rem; letter-spacing: .08em; text-transform: uppercase; }
    .header-badge {
      background: var(--green);
      color: var(--black);
      font-family: 'Barlow Condensed', Arial, sans-serif;
      font-weight: 700;
      font-size: .75rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .25rem .75rem;
      border-radius: 9999px;
    }
    .header-right { display: flex; align-items: center; gap: .75rem; }
    .logout-btn {
      font-family: 'Barlow Condensed', Arial, sans-serif;
      font-weight: 700;
      font-size: .75rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      background: transparent;
      color: rgba(255,255,255,.55);
      border: 1.5px solid rgba(255,255,255,.2);
      padding: .25rem .85rem;
      border-radius: 9999px;
      cursor: pointer;
      transition: all .15s;
    }
    .logout-btn:hover { color: var(--white); border-color: rgba(255,255,255,.5); }

    /* ── Summary cards ── */
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .summary-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.25rem 1rem;
      box-shadow: var(--shadow);
    }
    .summary-card .card-label {
      font-family: 'Barlow Condensed', Arial, sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .35rem;
    }
    .summary-card .card-count {
      font-family: 'Barlow Condensed', Arial, sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--dark);
      line-height: 1;
    }
    .summary-card .card-sub {
      font-size: .78rem;
      color: var(--muted);
      margin-top: .2rem;
    }
    .summary-card.total .card-count { color: var(--green-dark); }

    /* ── Section label ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-family: 'Barlow Condensed', Arial, sans-serif;
      font-weight: 700;
      font-size: .78rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--green-dark);
      margin-bottom: 1rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Filters & toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .75rem;
      margin-bottom: 1rem;
    }
    .filters { display: flex; gap: .4rem; flex-wrap: wrap; }
    .filter-btn {
      font-family: 'Barlow Condensed', Arial, sans-serif;
      font-weight: 700;
      font-size: .78rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
      padding: .3rem 1rem;
      border-radius: 9999px;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn:hover  { border-color: var(--green); color: var(--green-dark); }
    .filter-btn.active { background: var(--green); color: var(--black); border-color: var(--green); }

    /* ── Table ── */
    .reg-table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      background: var(--white);
      margin-bottom: 1rem;
    }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    thead tr { background: var(--dark); }
    th {
      padding: .8rem 1rem;
      text-align: left;
      font-family: 'Barlow Condensed', Arial, sans-serif;
      font-weight: 700;
      font-size: .75rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.65);
      white-space: nowrap;
    }
    td { padding: .7rem 1rem; border-top: 1px solid var(--border); vertical-align: top; }
    tr:hover td { background: var(--surface); }
    .empty-state { text-align: center; color: var(--muted); padding: 2.5rem; font-size: .95rem; }

    /* ── Buttons ── */
    .btn {
      font-family: 'Barlow Condensed', Arial, sans-serif;
      font-weight: 700;
      font-size: .88rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .55rem 1.4rem;
      border-radius: 9999px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    .btn-sm { font-size: .75rem; padding: .3rem .9rem; }
    .btn-primary { background: var(--green); color: var(--black); border-color: var(--green); }
    .btn-primary:hover { background: var(--green-dark); border-color: var(--green-dark); }
    .btn-outline { background: transparent; color: var(--dark); border-color: var(--dark); }
    .btn-outline:hover { background: var(--dark); color: var(--white); }
    .btn-danger { background: var(--danger); color: var(--white); border-color: var(--danger); }
    .btn-danger:hover { background: #b71c1c; border-color: #b71c1c; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--dark);
      color: var(--white);
      padding: .75rem 1.5rem;
      border-radius: 9999px;
      font-family: 'Barlow Condensed', Arial, sans-serif;
      font-weight: 700;
      font-size: .9rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      transition: opacity .25s, transform .25s;
      z-index: 1000;
      white-space: nowrap;
      pointer-events: none;
    }
    #toast.show   { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--green); color: var(--black); }
    #toast.error   { background: var(--danger); }

    footer {
      background: var(--dark);
      color: rgba(255,255,255,.4);
      text-align: center;
      padding: 1.25rem;
      font-size: .8rem;
      margin-top: 3rem;
      font-family: 'Barlow Condensed', Arial, sans-serif;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    footer span { color: var(--green); }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <span class="logo-arrow">→</span>
    <span class="logo-text">Pelotonia</span>
  </a>
  <div class="header-right">
    <span class="header-badge">Admin Dashboard</span>
    <form method="POST" action="/admin/logout" style="margin:0">
      <button type="submit" class="logout-btn">Sign Out</button>
    </form>
  </div>
</header>

<main>

  <!-- Summary cards (filled by JS) -->
  <div class="summary-grid" id="summaryGrid">
    <div style="grid-column:1/-1;text-align:center;padding:1rem;color:var(--muted)">Loading…</div>
  </div>

  <div class="section-label">All Registrations</div>

  <div class="toolbar">
    <div class="filters" id="adminFilters"></div>
    <button class="btn btn-primary" id="exportBtn">Export CSV</button>
  </div>

  <div class="reg-table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Address</th>
          <th>Emergency Contact</th>
          <th>EC Phone</th>
          <th>Session</th>
          <th>Comments</th>
          <th>Registered At</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="regTableBody"></tbody>
    </table>
  </div>

</main>

<footer>
  &copy; 2026 <span>Pelotonia</span> — Admin Use Only
</footer>

<div id="toast"></div>

<script src="/js/admin.js"></script>
</body>
</html>
